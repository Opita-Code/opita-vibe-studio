<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Vibe Studio Symbol</title>
  <desc id="desc">Four rounded modules forming a continuous loop with a diamond-shaped negative space, glowing with Vibe Cyan and Purple gradients.</desc>
  <defs>
    <linearGradient id="vibe-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="vibe-grad-2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="vibe-grad-3" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <linearGradient id="vibe-grad-4" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
  </defs>
  <g id="vibe-symbol">
    <rect x="40.00" y="61.00" width="92.00" height="42.00" rx="21.00" ry="21.00" fill="url(#vibe-grad-1)" transform="rotate(-45.00 86.00 82.00)"/>
    <rect x="124.00" y="61.00" width="92.00" height="42.00" rx="21.00" ry="21.00" fill="url(#vibe-grad-2)" transform="rotate(45.00 170.00 82.00)"/>
    <rect x="124.00" y="153.00" width="92.00" height="42.00" rx="21.00" ry="21.00" fill="url(#vibe-grad-3)" transform="rotate(-45.00 170.00 174.00)"/>
    <rect x="40.00" y="153.00" width="92.00" height="42.00" rx="21.00" ry="21.00" fill="url(#vibe-grad-4)" transform="rotate(45.00 86.00 174.00)"/>
  </g>

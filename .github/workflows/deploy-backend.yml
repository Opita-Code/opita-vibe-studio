name: Deploy Backend (SST)

on:
  push:
    tags: ['backend/v*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Deploy Info
        run: |
          echo "🚀 Backend Deploy"
          echo "   Tag: ${{ github.ref_name }}"
          echo "   SHA: ${{ github.sha }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy via SST
        run: npx sst deploy --stage prod
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEEP_SEEK_KEY: ${{ secrets.DEEP_SEEK_KEY }}
          API_GOOGLE_CLOUD: ${{ secrets.API_GOOGLE_CLOUD }}
          AI_STUDIO_GOOGLE: ${{ secrets.AI_STUDIO_GOOGLE }}
          GEMINI_API_KEY: ${{ secrets.API_GOOGLE_CLOUD }}
          WOMPI_PUBLIC_KEY: ${{ secrets.WOMPI_PUBLIC_KEY }}
          WOMPI_WEBHOOK_SECRET: ${{ secrets.WOMPI_WEBHOOK_SECRET }}
          WOMPI_INTEGRITY_SECRET: ${{ secrets.WOMPI_INTEGRITY_SECRET }}
          OPITA_LINKS_API_KEY: ${{ secrets.OPITA_LINKS_API_KEY }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          STAGING_WHITELIST: ${{ secrets.STAGING_WHITELIST }}

      - name: Verify API Health
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  POST-DEPLOY VERIFICATION"
          echo "═══════════════════════════════════════════════"
          FAILURES=0

          # 1. Core API reachable
          echo ""
          echo "── 1/3 Core API ──"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://api.opitacode.com/core/auth/me)
          echo "  /core/auth/me → $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "  ❌ FAIL: Core API unreachable"
            FAILURES=$((FAILURES + 1))
          else
            echo "  ✅ Core API reachable"
          fi

          # 2. Chat health check — verifies providers have valid keys
          echo ""
          echo "── 2/3 Chat Providers ──"
          CHAT_RESPONSE=$(curl -s -X POST https://api.opitacode.com/chat/ \
            -H "Content-Type: application/json" \
            -H "Origin: https://vibe.opitacode.com" \
            -d '{"action":"health_check"}')
          echo "  Response: $CHAT_RESPONSE"

          # Parse provider status
          DEEPSEEK=$(echo "$CHAT_RESPONSE" | grep -o '"deepseek":true' || true)
          GEMINI=$(echo "$CHAT_RESPONSE" | grep -o '"gemini":true' || true)
          STATUS=$(echo "$CHAT_RESPONSE" | grep -o '"status":"ok"' || true)

          if [ -z "$STATUS" ]; then
            echo "  ❌ FAIL: Chat Lambda not responding correctly"
            FAILURES=$((FAILURES + 1))
          else
            echo "  ✅ Chat Lambda healthy"
          fi

          if [ -z "$GEMINI" ]; then
            echo "  ❌ FAIL: Gemini API key missing or not configured"
            FAILURES=$((FAILURES + 1))
          else
            echo "  ✅ Gemini provider configured"
          fi

          if [ -z "$DEEPSEEK" ]; then
            echo "  ⚠️  WARN: DeepSeek key missing (fallback unavailable)"
          else
            echo "  ✅ DeepSeek provider configured"
          fi

          # 3. Billing API reachable
          echo ""
          echo "── 3/3 Billing API ──"
          BILL_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://api.opitacode.com/billing/sign?product=VIBE_STUDENT&userId=health-check")
          echo "  /billing/sign → $BILL_CODE"
          if [ "$BILL_CODE" = "000" ]; then
            echo "  ❌ FAIL: Billing API unreachable"
            FAILURES=$((FAILURES + 1))
          else
            echo "  ✅ Billing API reachable"
          fi

          # Final verdict
          echo ""
          echo "═══════════════════════════════════════════════"
          if [ "$FAILURES" -gt 0 ]; then
            echo "  ❌ DEPLOY VERIFICATION FAILED ($FAILURES checks)"
            echo "  The deploy completed but critical services are broken."
            echo "  Check API keys in GitHub Secrets and redeploy."
            echo "═══════════════════════════════════════════════"
            exit 1
          fi
          echo "  ✅ ALL CHECKS PASSED — Production is healthy"
          echo "═══════════════════════════════════════════════"

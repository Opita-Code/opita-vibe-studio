name: Deploy Backend (SST)

on:
  push:
    branches: [main]
    paths:
      - 'sst.config.ts'
      - 'packages/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy via SST
        run: npx sst deploy --stage prod
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          API_GOOGLE_CLOUD: ${{ secrets.API_GOOGLE_CLOUD }}
          AI_STUDIO_GOOGLE: ${{ secrets.AI_STUDIO_GOOGLE }}
          WOMPI_PUBLIC_KEY: ${{ secrets.WOMPI_PUBLIC_KEY }}
          WOMPI_WEBHOOK_SECRET: ${{ secrets.WOMPI_WEBHOOK_SECRET }}
          WOMPI_INTEGRITY_SECRET: ${{ secrets.WOMPI_INTEGRITY_SECRET }}
          OPITA_LINKS_API_KEY: ${{ secrets.OPITA_LINKS_API_KEY }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}

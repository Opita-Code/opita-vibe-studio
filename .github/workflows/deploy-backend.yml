name: Deploy Backend (SST)

on:
  push:
    tags: ['backend/v*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Deploy Info
        run: |
          echo "🚀 Backend Deploy"
          echo "   Tag: ${{ github.ref_name }}"
          echo "   SHA: ${{ github.sha }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy via SST
        run: npx sst deploy --stage prod
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEEP_SEEK_KEY: ${{ secrets.DEEP_SEEK_KEY }}
          API_GOOGLE_CLOUD: ${{ secrets.API_GOOGLE_CLOUD }}
          AI_STUDIO_GOOGLE: ${{ secrets.AI_STUDIO_GOOGLE }}
          GEMINI_API_KEY: ${{ secrets.API_GOOGLE_CLOUD }}
          WOMPI_PUBLIC_KEY: ${{ secrets.WOMPI_PUBLIC_KEY }}
          WOMPI_WEBHOOK_SECRET: ${{ secrets.WOMPI_WEBHOOK_SECRET }}
          WOMPI_INTEGRITY_SECRET: ${{ secrets.WOMPI_INTEGRITY_SECRET }}
          OPITA_LINKS_API_KEY: ${{ secrets.OPITA_LINKS_API_KEY }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          STAGING_WHITELIST: ${{ secrets.STAGING_WHITELIST }}

      - name: Verify API Health
        run: |
          echo "Verifying API is reachable..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://api.opitacode.com/core/auth/me)
          echo "  /auth/me returned: $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "❌ API unreachable after deploy"
            exit 1
          fi
          echo "✅ Backend deployed and reachable"

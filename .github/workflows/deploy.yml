name: Deploy Vibe Studio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy via SST (Backend)
        run: npx sst deploy --stage production
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Build Frontend
        run: npm run build

      - name: Deploy Frontend to S3 (Landing)
        run: aws s3 sync landing/ s3://vibe-landing-728741135483/ --delete --exclude "app/*"

      - name: Deploy Frontend to S3 (App)
        run: aws s3 sync dist/ s3://vibe-landing-728741135483/app/ --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id EONGVOV3BDAVI --paths "/*"

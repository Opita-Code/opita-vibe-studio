schema: spec-driven

context: |
  Tech stack: Tauri v2 + React 18 + TypeScript 5.4 (Windows desktop via WebView2)
  Backend: Rust (edition 2021) — Tauri commands for fs, shell, dialog, sql (SQLite), updater
  State: Zustand 4.5
  Editor: Monaco Editor 0.45 (@monaco-editor/react)
  Styling: Tailwind CSS 3.4 — custom "opita" + "vibe" palettes (indigo tones, brand tokens)
  Runtime: Node.js ESM, Vite 5.4, npm
  Commit style: conventional commits in Spanish — tipo(scope): descripción
  Quality gates: npm test && npm run typecheck && npm run lint
  Governance: OpenSpec SDD — hybrid mode (openspec + engram)

strict_tdd: true

testing:
  strict_tdd_mode: enabled
  detected: 2026-05-09
  test_runner:
    framework: vitest
    command: "npx vitest run"
  test_layers:
    unit:
      available: true
      tool: vitest
    integration:
      available: true
      tool: "@testing-library/react + jsdom"
    e2e:
      available: false
      tool: "-"
  coverage:
    available: false
    command: "-"
  quality_tools:
    linter:
      available: true
      command: "npx eslint ."
    type_checker:
      available: true
      command: "tsc --noEmit"
    formatter:
      available: true
      command: "prettier --write ."

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
    tdd: true
    test_command: "npx vitest run"
  verify:
    test_command: "npx vitest run"
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas (large removals)
